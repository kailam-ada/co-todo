<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>Co-Todo — Hi-Fi · Mobile · Tablette · Web</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --c-bg:#FAF7F1; --c-surface:#FFFFFF; --c-line:#D9D4C9;
    --c-ink:#1B1A17; --c-muted:#5E5A52; --c-faint:#737060;
    --c-primary:#073841; --c-primary-soft:#DBE7E9; --c-primary-ink:#FFF;
    --c-accent:#C77127;
    --ff-sans:"Atkinson Hyperlegible",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    --ff-mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
    --bezel:#211F1B;
  }
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    background:
      radial-gradient(120% 80% at 50% -10%, #F3EEE4 0%, #ECE6DA 55%, #E5DECF 100%) fixed;
    color:var(--c-ink); font-family:var(--ff-sans);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    display:flex; flex-direction:column; overflow:hidden;
  }

  /* ---------------- Top bar ---------------- */
  .bar{
    flex:0 0 auto; display:flex; align-items:center; gap:18px;
    padding:14px 22px; background:rgba(255,255,255,.72);
    backdrop-filter:saturate(140%) blur(14px);
    border-bottom:1px solid var(--c-line);
    box-shadow:0 1px 0 rgba(27,26,23,.03), 0 8px 24px -18px rgba(27,26,23,.3);
    z-index:5; flex-wrap:wrap;
  }
  .brand{display:flex; align-items:center; gap:11px; min-width:0;}
  .brand-mark.logo{
    width:36px; height:36px; flex:0 0 auto; background:transparent;
    display:flex; align-items:center; justify-content:center;
  }
  .brand-mark.logo svg{width:100%; height:100%; display:block;}
  .brand-mark{
    width:34px; height:34px; flex:0 0 auto; border-radius:9px;
    background:var(--c-primary); color:var(--c-primary-ink);
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:18px; letter-spacing:.5px;
  }
  .brand .tt{font-weight:700; font-size:16px; line-height:1.15;}
  .brand .st{font-size:12.5px; color:var(--c-faint); line-height:1.15;}

  .group{display:flex; align-items:center; gap:8px;}
  .group .lbl{font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--c-faint);}

  .seg{display:inline-flex; background:var(--c-surface); border:1px solid var(--c-line);
    border-radius:11px; padding:3px; gap:2px; box-shadow:inset 0 1px 0 rgba(255,255,255,.6);}
  .seg button{
    appearance:none; border:0; background:transparent; cursor:pointer;
    font-family:inherit; font-size:13.5px; font-weight:700; color:var(--c-muted);
    padding:7px 13px; border-radius:8px; line-height:1; white-space:nowrap;
    transition:background .15s,color .15s;
  }
  .seg button:hover{color:var(--c-ink);}
  .seg button[aria-pressed="true"]{background:var(--c-primary); color:var(--c-primary-ink);}
  .seg.fmt button[aria-pressed="true"]{background:var(--c-accent); color:#fff;}
  .seg button .ico{display:none;}

  .spacer{flex:1 1 auto;}
  .hint{font-size:12.5px; color:var(--c-faint); display:flex; align-items:center; gap:7px;}
  .hint svg{width:15px; height:15px; flex:0 0 auto;}

  /* ---------------- Stage ---------------- */
  .stage{
    flex:1 1 auto; position:relative; overflow:auto;
    display:flex; align-items:flex-start; justify-content:center;
    padding:40px 32px 56px;
  }
  .fitbox{position:relative;}
  .fit-inner{position:absolute; top:0; left:0; transform-origin:top left;}
  .row{display:flex; align-items:flex-end; gap:64px;}

  /* device shell shared */
  .device{display:flex; flex-direction:column; align-items:center; gap:0;}
  .device .cap{
    margin-top:18px; text-align:center;
  }
  .device .cap .name{font-weight:700; font-size:16px; letter-spacing:.01em;}
  .device .cap .dim{font-family:var(--ff-mono); font-size:12px; color:var(--c-faint); margin-top:2px;}
  .device .cap .note{font-size:12px; color:var(--c-faint); margin-top:5px; max-width:240px; line-height:1.4;}

  iframe{border:0; display:block; background:var(--c-bg);}

  /* phone */
  .phone .hw{
    position:relative; background:var(--bezel); border-radius:46px;
    padding:14px; box-shadow:0 2px 1px rgba(255,255,255,.18) inset,
      0 30px 60px -24px rgba(27,26,23,.55), 0 8px 22px -12px rgba(27,26,23,.4);
  }
  .phone .hw::after{ /* side buttons */
    content:""; position:absolute; right:-3px; top:130px; width:3px; height:64px;
    background:#15130f; border-radius:0 3px 3px 0;
  }
  .phone .screen{position:relative; border-radius:33px; overflow:hidden; background:#000;}
  .phone .notch{
    position:absolute; top:9px; left:50%; transform:translateX(-50%);
    width:104px; height:24px; background:#000; border-radius:14px; z-index:3; pointer-events:none;
  }

  /* tablet */
  .tablet .hw{
    position:relative; background:var(--bezel); border-radius:30px;
    padding:16px; box-shadow:0 2px 1px rgba(255,255,255,.16) inset,
      0 34px 70px -26px rgba(27,26,23,.5), 0 10px 26px -14px rgba(27,26,23,.4);
  }
  .tablet .screen{position:relative; border-radius:16px; overflow:hidden; background:#000;}
  .tablet .cam{position:absolute; top:7px; left:50%; transform:translate(-50%);
    width:7px; height:7px; border-radius:50%; background:#3a3732; z-index:3;
    box-shadow:0 0 0 2px rgba(255,255,255,.04);}

  /* browser (web) */
  .web .hw{
    background:var(--c-surface); border:1px solid var(--c-line);
    border-radius:14px; overflow:hidden;
    box-shadow:0 34px 80px -30px rgba(27,26,23,.5), 0 10px 26px -16px rgba(27,26,23,.34);
  }
  .web .chrome{
    display:flex; align-items:center; gap:12px; height:46px; padding:0 16px;
    background:linear-gradient(#FBF9F4,#F2EDE2); border-bottom:1px solid var(--c-line);
  }
  .web .lights{display:flex; gap:8px; flex:0 0 auto;}
  .web .lights i{width:12px; height:12px; border-radius:50%; display:block;}
  .web .lights i:nth-child(1){background:#E8675B;}
  .web .lights i:nth-child(2){background:#E7B84B;}
  .web .lights i:nth-child(3){background:#69C25C;}
  .web .url{
    flex:1 1 auto; height:28px; max-width:520px; margin:0 auto;
    background:var(--c-surface); border:1px solid var(--c-line); border-radius:8px;
    display:flex; align-items:center; gap:8px; padding:0 12px;
    font-family:var(--ff-mono); font-size:12.5px; color:var(--c-muted);
  }
  .web .url svg{width:13px; height:13px; flex:0 0 auto; color:var(--c-success,#15663D);}
  .web .ctrl{display:flex; gap:14px; flex:0 0 auto; color:var(--c-faint);}
  .web .ctrl svg{width:16px; height:16px;}

  /* loading shimmer over each screen until ready */
  .screen .ld, .web .hw .ld{
    position:absolute; inset:0; z-index:4; background:var(--c-bg);
    display:flex; align-items:center; justify-content:center;
    transition:opacity .4s; color:var(--c-faint); font-size:13px;
  }
  .web .hw{position:relative;}
  .device.ready .ld{opacity:0; pointer-events:none;}

  @media (max-width:760px){
    .bar{gap:12px; padding:12px 14px;}
    .brand .st{display:none;}
    .group .lbl{display:none;}
    .seg button{padding:7px 10px; font-size:12.5px;}
    .hint{display:none;}
  }
</style>
</head>
<body>

  <header class="bar">
    <div class="brand">
      <span class="brand-mark logo" role="img" aria-label="Co-Todo">
        <svg viewBox="0 0 100 100" focusable="false" aria-hidden="true">
          <circle cx="36" cy="50" r="30" fill="#073841"/>
          <circle cx="64" cy="50" r="31.6" fill="#FFFFFF"/>
          <circle cx="64" cy="50" r="30" fill="#C77127"/>
          <clipPath id="wbm-clip"><circle cx="36" cy="50" r="30"/></clipPath>
          <circle cx="64" cy="50" r="30" fill="#04181F" clip-path="url(#wbm-clip)"/>
        </svg>
      </span>
      <div>
        <div class="tt">Co-Todo — Hi-Fi</div>
        <div class="st">Une seule maquette, trois formats responsives</div>
      </div>
    </div>

    <div class="group">
      <span class="lbl">Écran</span>
      <div class="seg" id="screen-seg" role="group" aria-label="Choisir l'écran">
        <button type="button" data-view="dashboard" aria-pressed="true">Tableau de bord</button>
        <button type="button" data-view="pool" aria-pressed="false">Réserve</button>
        <button type="button" data-view="create" aria-pressed="false">Création</button>
      </div>
    </div>

    <span class="spacer"></span>

    <div class="group">
      <span class="lbl">Format</span>
      <div class="seg fmt" id="fmt-seg" role="group" aria-label="Choisir le format">
        <button type="button" data-fmt="all" aria-pressed="true">Tout</button>
        <button type="button" data-fmt="mobile" aria-pressed="false">Mobile</button>
        <button type="button" data-fmt="tablet" aria-pressed="false">Tablette</button>
        <button type="button" data-fmt="web" aria-pressed="false">Web</button>
      </div>
    </div>

    <span class="hint">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16v-4M12 8h.01"/><circle cx="12" cy="12" r="9"/></svg>
      Maquettes vivantes — cliquez à l'intérieur
    </span>
  </header>

  <div class="stage" id="stage">
    <div class="fitbox" id="fitbox">
      <div class="fit-inner" id="fitinner">
        <div class="row" id="row">

          <!-- MOBILE -->
          <figure class="device phone" data-fmt="mobile" style="margin:0;">
            <div class="hw">
              <div class="screen" style="width:390px; height:800px;">
                <div class="notch" aria-hidden="true"></div>
                <div class="ld">Chargement…</div>
                <iframe data-frame title="Co-Todo sur mobile" src="Co-Todo Hi-Fi.html?v=2#dashboard" width="390" height="800"></iframe>
              </div>
            </div>
            <figcaption class="cap">
              <div class="name">Mobile</div>
              <div class="dim">390 px · ≤ 600</div>
              <div class="note">Barre d'onglets en bas, formulaire condensé, jauge simplifiée.</div>
            </figcaption>
          </figure>

          <!-- TABLET -->
          <figure class="device tablet" data-fmt="tablet" style="margin:0;">
            <div class="hw">
              <div class="screen" style="width:820px; height:1040px;">
                <div class="cam" aria-hidden="true"></div>
                <div class="ld">Chargement…</div>
                <iframe data-frame title="Co-Todo sur tablette" src="Co-Todo Hi-Fi.html?v=2#dashboard" width="820" height="1040"></iframe>
              </div>
            </div>
            <figcaption class="cap">
              <div class="name">Tablette</div>
              <div class="dim">820 px · ≤ 980</div>
              <div class="note">Navigation haute conservée, colonnes empilées, rail d'indicateurs masqué.</div>
            </figcaption>
          </figure>

          <!-- WEB -->
          <figure class="device web" data-fmt="web" style="margin:0;">
            <div class="hw">
              <div class="chrome" aria-hidden="true">
                <div class="lights"><i></i><i></i><i></i></div>
                <div class="url">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
                  co-todo.app/tableau-de-bord
                </div>
                <div class="ctrl">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 12a8 8 0 1 1 2.3 5.6"/><path d="M4 19v-5h5"/></svg>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
                </div>
              </div>
              <div class="ld">Chargement…</div>
              <iframe data-frame title="Co-Todo sur le web" src="Co-Todo Hi-Fi.html?v=2#dashboard" width="1280" height="800"></iframe>
            </div>
            <figcaption class="cap">
              <div class="name">Web</div>
              <div class="dim">1280 px · > 980</div>
              <div class="note">Mise en page complète : deux colonnes, recherche et rail d'indicateurs en direct.</div>
            </figcaption>
          </figure>

        </div>
      </div>
    </div>
  </div>

<script>
(function(){
  var stage   = document.getElementById('stage');
  var fitbox  = document.getElementById('fitbox');
  var inner   = document.getElementById('fitinner');
  var row     = document.getElementById('row');
  var devices = Array.prototype.slice.call(row.querySelectorAll('.device'));
  var frames  = Array.prototype.slice.call(document.querySelectorAll('iframe[data-frame]'));
  var screenSeg = document.getElementById('screen-seg');
  var fmtSeg    = document.getElementById('fmt-seg');

  var fmt = 'all';
  var view = 'dashboard';

  /* mark each device ready when its iframe loads */
  function markReady(f){
    var d = f.closest('.device'); if(d) d.classList.add('ready');
    try{ f.contentWindow.postMessage({cotodo:'goto', view:view}, '*'); }catch(e){}
  }
  frames.forEach(function(f){
    f.addEventListener('load', function(){ markReady(f); });
    // load may have fired before this listener attached
    try{ if(f.contentDocument && f.contentDocument.readyState === 'complete') markReady(f); }catch(e){}
    // safety net: never leave a stuck "Chargement…"
    setTimeout(function(){ markReady(f); }, 3500);
  });

  /* ----- screen switcher ----- */
  function setView(v){
    view = v;
    Array.prototype.forEach.call(screenSeg.children, function(b){
      b.setAttribute('aria-pressed', String(b.dataset.view === v));
    });
    frames.forEach(function(f){
      try{ f.contentWindow.postMessage({cotodo:'goto', view:v}, '*'); }catch(e){}
    });
    var url = document.querySelector('.web .url');
    if(url){
      var slug = v === 'dashboard' ? 'tableau-de-bord' : (v === 'pool' ? 'reserve' : 'creation');
      url.lastChild.textContent = ' co-todo.app/' + slug;
    }
  }
  screenSeg.addEventListener('click', function(e){
    var b = e.target.closest('button'); if(!b) return; setView(b.dataset.view);
  });

  /* ----- format focus ----- */
  function setFmt(f){
    fmt = f;
    Array.prototype.forEach.call(fmtSeg.children, function(b){
      b.setAttribute('aria-pressed', String(b.dataset.fmt === f));
    });
    devices.forEach(function(d){
      d.style.display = (f === 'all' || d.dataset.fmt === f) ? '' : 'none';
    });
    fit();
  }
  fmtSeg.addEventListener('click', function(e){
    var b = e.target.closest('button'); if(!b) return; setFmt(b.dataset.fmt);
  });

  /* ----- fit-to-screen scaling ----- */
  function fit(){
    // reset to measure natural size
    inner.style.transform = 'none';
    fitbox.style.width = ''; fitbox.style.height = '';
    var natW = row.offsetWidth, natH = row.offsetHeight;
    if(!natW || !natH) return;

    var padX = 64, padY = 80;
    var availW = stage.clientWidth  - padX;
    var availH = stage.clientHeight - padY;

    var s = Math.min(availW / natW, availH / natH);
    // single-format gets to grow a bit; "all" never upsizes past 1
    var cap = (fmt === 'all') ? 1 : 1.18;
    s = Math.max(0.22, Math.min(cap, s));

    inner.style.transform = 'scale(' + s + ')';
    fitbox.style.width  = (natW * s) + 'px';
    fitbox.style.height = (natH * s) + 'px';
  }

  window.addEventListener('resize', fit);
  // refit a few times as fonts/iframes settle
  [120, 400, 900, 1600].forEach(function(t){ setTimeout(fit, t); });
  fit();
})();
</script>

</body>
</html>
